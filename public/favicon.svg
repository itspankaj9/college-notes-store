<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20B2AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a73e8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#g)"/>
  <!-- Letter P with premium font & filter -->
  <text x="50%" y="54%" font-family="'Outfit', 'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="900" font-size="280" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)">P</text>
</svg>
